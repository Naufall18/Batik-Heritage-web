<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Batik Heritage">
  <!-- Emblem cap batik: lingkaran nila + isen-isen cecek kunyit + monogram B -->
  <circle cx="32" cy="32" r="31" fill="#24305e"/>
  <circle cx="32" cy="32" r="27.5" fill="none" stroke="#e0a526" stroke-width="1" stroke-dasharray="1 3.4" stroke-linecap="round"/>
  <g fill="#e0a526">
    <!-- 8 titik canting mengelilingi -->
    <circle cx="32" cy="8.5"  r="1.6"/>
    <circle cx="48.6" cy="15.4" r="1.6"/>
    <circle cx="55.5" cy="32"  r="1.6"/>
    <circle cx="48.6" cy="48.6" r="1.6"/>
    <circle cx="32" cy="55.5" r="1.6"/>
    <circle cx="15.4" cy="48.6" r="1.6"/>
    <circle cx="8.5" cy="32"   r="1.6"/>
    <circle cx="15.4" cy="15.4" r="1.6"/>
  </g>
  <text x="32" y="43" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#f7f3e8">B</text>
</svg>
