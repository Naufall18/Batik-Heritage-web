<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Motif kawung-terinspirasi (geometris, orisinal & tileable) untuk latar halus -->
  <defs>
    <g id="kawung" fill="none" stroke="#24305e" stroke-width="1.4">
      <!-- empat kelopak mengelilingi pusat -->
      <ellipse cx="60" cy="34" rx="13" ry="20"/>
      <ellipse cx="60" cy="86" rx="13" ry="20"/>
      <ellipse cx="34" cy="60" rx="20" ry="13"/>
      <ellipse cx="86" cy="60" rx="20" ry="13"/>
    </g>
  </defs>
  <rect width="120" height="120" fill="#f7f3e8"/>
  <use href="#kawung"/>
  <!-- cecek (titik isen) di pusat & sudut agar menyambung antar-ubin -->
  <g fill="#24305e">
    <circle cx="60" cy="60" r="2.2"/>
    <circle cx="0" cy="0" r="2.2"/>
    <circle cx="120" cy="0" r="2.2"/>
    <circle cx="0" cy="120" r="2.2"/>
    <circle cx="120" cy="120" r="2.2"/>
  </g>
  <!-- kelopak di tepi agar pola bersambung mulus saat di-tile -->
  <g fill="none" stroke="#24305e" stroke-width="1.4">
    <ellipse cx="0" cy="34" rx="13" ry="20"/>
    <ellipse cx="120" cy="34" rx="13" ry="20"/>
    <ellipse cx="0" cy="86" rx="13" ry="20"/>
    <ellipse cx="120" cy="86" rx="13" ry="20"/>
    <ellipse cx="34" cy="0" rx="20" ry="13"/>
    <ellipse cx="86" cy="0" rx="20" ry="13"/>
    <ellipse cx="34" cy="120" rx="20" ry="13"/>
    <ellipse cx="86" cy="120" rx="20" ry="13"/>
  </g>
</svg>
